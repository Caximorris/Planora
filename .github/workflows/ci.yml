name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Integration tests boot the real API against Postgres. The test factory connects to
    # localhost:5433 with postgres/admin1234 and creates/drops the planora_test database itself.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin1234
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Planora.slnx

      - name: Build
        run: dotnet build Planora.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Planora.slnx --configuration Release --no-build --verbosity normal
