name: Deploy API to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'Planora.Api/**'
      - 'Planora.Shared/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/planora-api:${{ github.sha }}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Planora.Api/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set registry credentials and deploy
        env:
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::RESEND_API_KEY GitHub secret is required for production email delivery."
            exit 1
          fi
          if [ -z "$STORAGE_CONNECTION_STRING" ]; then
            echo "::error::STORAGE_CONNECTION_STRING GitHub secret is required for durable blob storage."
            exit 1
          fi

          retry() {
            local max_attempts=5
            local delay_seconds=5
            local attempt=1

            while [ "$attempt" -le "$max_attempts" ]; do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Azure operation failed on attempt $attempt/$max_attempts; retrying in ${delay_seconds}s..."
                sleep "$delay_seconds"
                delay_seconds=$((delay_seconds * 2))
              fi
              attempt=$((attempt + 1))
            done

            echo "::error::Azure operation failed after $max_attempts attempts."
            return 1
          }

          az extension add --name containerapp --upgrade --only-show-errors
          retry az containerapp registry set \
            --name planora-api \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server ghcr.io \
            --username ${{ github.repository_owner }} \
            --password ${{ secrets.GHCR_TOKEN }}
          retry az containerapp secret set \
            --name planora-api \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets \
              resend-api-key="$RESEND_API_KEY" \
              storage-connection-string="$STORAGE_CONNECTION_STRING"
          retry az containerapp update \
            --name planora-api \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image ${{ env.IMAGE }} \
            --set-env-vars \
              "Cors__AllowedOrigins=$CORS_ALLOWED_ORIGINS" \
              "App__WebBaseUrl=https://planora.website" \
              "Email__Provider=Resend" \
              "Email__From__Address=notifications@planora.website" \
              "Email__From__Name=Planora" \
              "Email__Resend__ApiKey=secretref:resend-api-key" \
              "Storage__Provider=AzureBlob" \
              "Storage__Blob__ConnectionString=secretref:storage-connection-string" \
              "Storage__Blob__PublicBaseUrl=https://planorabs.blob.core.windows.net/uploads"
