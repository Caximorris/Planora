name: Deploy Web to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'Planora.Web/**'
      - 'Planora.Shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Blazor WASM

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Inject production API URL
        run: |
          cat << EOF > Planora.Web/wwwroot/appsettings.Production.json
          {
            "ApiBaseUrl": "${{ secrets.API_BASE_URL }}"
          }
          EOF

      - name: Publish Blazor WASM
        run: dotnet publish Planora.Web/Planora.Web.csproj -c Release -o publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: publish/wwwroot
          api_location: ''
          output_location: ''
          skip_app_build: true
