<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Planora</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css?v=__PLANORA_BUILD_VERSION__" />
    <link rel="stylesheet" href="lib/cropperjs/cropper.min.css?v=__PLANORA_BUILD_VERSION__" />
    <link rel="stylesheet" href="css/app.css?v=__PLANORA_BUILD_VERSION__" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3" />
    <link rel="icon" type="image/png" href="favicon.png?v=3" />
    <link rel="shortcut icon" href="favicon.png?v=3" />
    <link href="Planora.Web.styles.css?v=__PLANORA_BUILD_VERSION__" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        // Applied before any CSS/Blazor renders, straight from localStorage — avoids a flash of
        // the light theme on every refresh for users who picked dark.
        (function () {
            var theme = localStorage.getItem('planora-theme') || 'light';
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="splash-loading">
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">✕</span>
    </div>
    <script src="lib/sortablejs/Sortable.min#[.{fingerprint}].js"></script>
    <script src="lib/cropperjs/cropper.min#[.{fingerprint}].js"></script>
    <script src="js/board-sortable#[.{fingerprint}].js"></script>
    <script src="js/modal-a11y#[.{fingerprint}].js"></script>
    <script src="js/theme#[.{fingerprint}].js"></script>
    <script src="js/search#[.{fingerprint}].js"></script>
    <script src="js/download#[.{fingerprint}].js"></script>
    <script src="js/deployment-version#[.{fingerprint}].js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
